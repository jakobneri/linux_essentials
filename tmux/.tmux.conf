# Farben
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Status Bar
set -g status-style "bg=#1E1A2E,fg=#C4A7E7"
set -g status-left "#[bg=#9D7FD4,fg=#1E1A2E,bold] #S #[bg=#1E1A2E,fg=#9D7FD4]"
set -g status-right "#[fg=#6E6A86] %H:%M  %d.%m.%Y #[bg=#1E1A2E,fg=#6E6A86]"
set -g status-left-length 20

# Fenster-Tabs
set -g window-status-format "#[fg=#6E6A86] #I:#W "
set -g window-status-current-format "#[bg=#2D2640,fg=#C4A7E7,bold] #I:#W "

# Pane-Borders
set -g pane-border-style "fg=#2D2640"
set -g pane-active-border-style "fg=#9D7FD4"

# Maus
set -g mouse on
